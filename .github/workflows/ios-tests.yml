name: iOS Tests

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: XCTest
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail

          xcrun simctl list devices available -j > "$RUNNER_TEMP/simulators.json"
          simulator_id="$(
            python3 - "$RUNNER_TEMP/simulators.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as file:
              payload = json.load(file)

          devices = [
              device
              for runtime_devices in payload["devices"].values()
              for device in runtime_devices
              if device.get("isAvailable") and device.get("name", "").startswith("iPhone")
          ]

          preferred = [device for device in devices if device.get("name") == "iPhone 17"]
          selected = (preferred or devices)[0] if devices else None
          if selected:
              print(selected["udid"])
          PY
          )"

          if [ -z "$simulator_id" ]; then
            echo "No available iPhone simulator found." >&2
            exit 1
          fi

          echo "id=$simulator_id" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$simulator_id" || true

      - name: Run tests
        run: |
          set -euo pipefail

          mkdir -p TestResults
          xcodebuild test \
            -project Caloryn.xcodeproj \
            -scheme Caloryn \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -resultBundlePath TestResults/CalorynTests.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test result bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: TestResults
          if-no-files-found: ignore
